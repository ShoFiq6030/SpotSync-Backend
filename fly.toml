# fly.toml app configuration file generated for spotsync-backend on 2026-06-29T16:42:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'spotsync-backend'
primary_region = 'sin'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
